name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --ignore=tests/benchmarks --cov=mempalace --cov-report=term-missing --cov-fail-under=80

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --ignore=tests/benchmarks --cov=mempalace --cov-report=term-missing --cov-fail-under=80

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --ignore=tests/benchmarks --cov=mempalace --cov-report=term-missing --cov-fail-under=80

  test-nlp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,nlp-full]"
      - run: python -m spacy download xx_ent_wiki_sm
      - name: Run base test suite with NLP flags enabled
        env:
          MEMPALACE_NLP_SENTENCES: "1"
          MEMPALACE_NLP_NEGATION: "1"
          MEMPALACE_NLP_NER: "1"
          MEMPALACE_NLP_CLASSIFY: "1"
          MEMPALACE_NLP_TRIPLES: "1"
        run: python -m pytest tests/ -v --ignore=tests/benchmarks -m "not benchmark and not stress" --cov=mempalace --cov-report=term-missing --cov-fail-under=80
      - name: Run NLP integration tests with real providers
        run: python -m pytest tests/test_nlp_integration.py -v -m "nlp"
        continue-on-error: true

  benchmark-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install base dependencies
        run: pip install -e ".[dev]"
      - name: Quality benchmark WITHOUT NLP providers (baseline)
        run: python benchmarks/with-nlp-provider/bench_nlp_providers.py --self-test
      - name: Install NLP dependencies
        run: pip install -e ".[nlp-full]"
      - name: Download spaCy model
        run: python -m spacy download xx_ent_wiki_sm
      - name: Quality benchmark WITH NLP providers
        env:
          MEMPALACE_NLP_SENTENCES: "1"
          MEMPALACE_NLP_NEGATION: "1"
          MEMPALACE_NLP_NER: "1"
          MEMPALACE_NLP_CLASSIFY: "1"
          MEMPALACE_NLP_TRIPLES: "1"
        run: python benchmarks/with-nlp-provider/bench_nlp_providers.py --self-test

  benchmark-speed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install base dependencies
        run: pip install -e ".[dev]"
      - name: Speed benchmark WITHOUT NLP providers (baseline)
        timeout-minutes: 10
        run: python -m pytest tests/benchmarks/ -v -m "benchmark and not stress" --bench-scale small
      - name: Install NLP dependencies
        run: pip install -e ".[nlp-full]"
      - name: Download spaCy model
        run: python -m spacy download xx_ent_wiki_sm
      - name: Speed benchmark WITH NLP providers
        timeout-minutes: 10
        env:
          MEMPALACE_NLP_SENTENCES: "1"
          MEMPALACE_NLP_NEGATION: "1"
          MEMPALACE_NLP_NER: "1"
          MEMPALACE_NLP_CLASSIFY: "1"
          MEMPALACE_NLP_TRIPLES: "1"
        run: python -m pytest tests/benchmarks/ -v -m "benchmark and not stress" --bench-scale small

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.4.0,<0.5"
      - run: ruff check .
      - run: ruff format --check .
